@if (this.loadingservice.isloading()) {
  <div class="fixed inset-0 z-999 flex items-center justify-center bg-black/20 backdrop-blur-sm">
    <!-- الـ Spinner بتاعك (ممكن تجيبه من Flowbite) -->
    <div
      class="w-12 h-12 border-4 border-t-[var(--main-color)] border-gray-200 rounded-full animate-spin"
    ></div>
  </div>
}
