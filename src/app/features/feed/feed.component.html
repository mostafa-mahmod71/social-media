<div class="container mx-auto flex justify-between gap-4">
  <!-- small dash -->
  <div class="my-2 hidden md:block w-2/12">
    <aside
      class="w-full bg-secligter/50 rounded-2xl shadow-sm border border-secoundcolor p-4 sticky top-17"
    >
      <ul class="space-y-2 font-medium">
        <!-- Feed Tab -->
        <li>
          <button
            class="flex items-center w-full p-3 text-headcolor/70 hover:text-secligter hover:bg-maincolor/90 rounded-xl group transition-all duration-200 cursor-pointer"
          >
            <i
              class="fa-solid fa-house text-lg w-6 transition-colors group-hover:text-[var(--main-color)]"
            ></i>
            <span class="ms-3">Feed</span>
          </button>
        </li>

        <!-- My Profile Tab -->
        <li>
          <button
            class="flex items-center w-full p-3 text-headcolor/70 hover:text-secligter hover:bg-maincolor/90 group transition-all duration-200 cursor-pointer"
          >
            <i
              class="fa-solid fa-user text-lg w-6 transition-colors group-hover:text-[var(--main-color)]"
            ></i>
            <span class="ms-3">My Profile</span>
          </button>
        </li>

        <!-- Settings Tab -->
        <li>
          <button
            class="flex items-center w-full p-3 text-headcolor/70 hover:text-secligter hover:bg-maincolor/90 rounded-xl group transition-all duration-200 cursor-pointer"
          >
            <i
              class="fa-solid fa-gear text-lg w-6 transition-colors group-hover:text-[var(--main-color)]"
            ></i>
            <span class="ms-3">Settings</span>
          </button>
        </li>

        <!-- Logout (Optional but Good) -->
        <li class="pt-4 mt-4 border-t border-gray-100 dark:border-gray-800">
          <button
            class="flex items-center w-full p-3 text-red-500 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 transition-all duration-200 cursor-pointer"
          >
            <i class="fa-solid fa-right-from-bracket text-lg w-6"></i>
            <span class="ms-3">Logout</span>
          </button>
        </li>
      </ul>
    </aside>
  </div>

  <!-- posts -->
  <div class="my-2 w-full md:w-7/12">
    <div class="px-4 md:px-0">
      <app-create-post (refreshPosts)="single.getAllPosts()"></app-create-post>

      <app-singlepost #single></app-singlepost>
    </div>
  </div>

  <!-- suggested  -->
  <div class="my-2 hidden md:block w-3/12">
    <app-followsugg></app-followsugg>
  </div>
</div>
